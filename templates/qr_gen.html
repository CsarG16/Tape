<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR Secreto ❤</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FBDBDA;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #590d22;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 1rem 0;
            border: 2px solid #E9ABAC;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #C55C66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        button:hover {
            background-color: #CE6E75;
        }

        #canvas-container {
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Generador de QR</h1>
        <p>Introduce la URL que verás en tu celular (ej: http://192.168.100.18:8000)</p>
        <input type="text" id="qr-url" placeholder="http://..." value="http://192.168.100.18:8000">
        <button onclick="generateQR()">Generar QR con Corazón</button>
        <button onclick="downloadQR()" id="download-btn"
            style="display:none; background-color: #590d22;">Descargar</button>

        <div id="canvas-container"></div>
    </div>

    <script>
        let qrCode;

        function generateQR() {
            const url = document.getElementById('qr-url').value;
            if (!url) return alert("Pon una URL válida");

            qrCode = new QRCodeStyling({
                width: 300,
                height: 300,
                type: "svg",
                data: url,
                dotsOptions: {
                    color: "#C55C66",
                    type: "rounded" // Podemos usar 'dots' o 'rounded'
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                cornersSquareOptions: {
                    color: "#590d22",
                    type: "extra-rounded"
                },
                cornersDotOptions: {
                    color: "#590d22",
                    type: "dot"
                },
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 10
                }
                // Nota: Para un corazón en el medio, necesitaríamos una imagen de un corazón.
                // Intentaremos usar un emoji o una imagen de corazón simple si la tuvieras.
                // Por ahora, usaremos puntos redondeados que dan un aspecto más suave.
            });

            const container = document.getElementById("canvas-container");
            container.innerHTML = "";
            qrCode.append(container);
            document.getElementById("download-btn").style.display = "inline-block";
        }

        function downloadQR() {
            qrCode.download({ name: "qr-ximenita", extension: "png" });
        }
    </script>
</body>

</html>
