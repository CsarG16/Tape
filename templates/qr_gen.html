<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR para Xime ❤</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FBDBDA 0%, #F2C3C2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #590d22;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(197, 92, 102, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 2px solid #E9ABAC;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 1rem 0;
            border: 2px solid #E9ABAC;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            font-family: monospace;
            font-size: 1rem;
        }
        .btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button {
            background-color: #C55C66;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(197, 92, 102, 0.4); 
        }
        #download-btn { background-color: #590d22; }
        #canvas-container { 
            margin-top: 2rem; 
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.05); }
            28% { transform: scale(1); }
            42% { transform: scale(1.05); }
            70% { transform: scale(1); }
        }
        .pulse { animation: heartbeat 1.5s ease-in-out; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="margin:0; font-size: 1.8rem; color: #590d22;">QR para Xime ❤</h1>
        <p style="font-size: 0.95rem; margin-top: 0.5rem; color: #C55C66;">Ingresa tu enlace local y genera la magia</p>
        
        <input type="text" id="qr-url" placeholder="URL del proyecto" value="http://192.168.100.18:8000">
        
        <div class="btns">
            <button onclick="generateQR()">Generar QR</button>
            <button onclick="downloadQR()" id="download-btn" style="display:none;">Descargar Imagen</button>
        </div>
        
        <div id="canvas-container" style="display:none;">
            <div id="qr-result"></div>
        </div>
    </div>

    <script>
        let qrCode;

        function generateQR() {
            const url = document.getElementById('qr-url').value;
            if (!url) return alert("Por favor ingresa una URL");

            const resultContainer = document.getElementById("qr-result");
            const canvasContainer = document.getElementById("canvas-container");
            
            // Limpiamos el contenedor antes de generar
            resultContainer.innerHTML = "";
            canvasContainer.style.display = "inline-flex";

            qrCode = new QRCodeStyling({
                width: 280,
                height: 280,
                type: "canvas", 
                data: url,
                image: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48cGF0aCBmaWxsPSIjQzU1QzY2IiBkPSJNNDYyLjMgNjIuNkM0MDcuNSAxNS45IDMyNiAyNC4zIDI3NS43IDc2LjJMMjU2IDk2LjVsLTE5LjctMjAuM0MxODYuMSAyNC4zIDEwNC41IDE1LjkgNDkuNyA2Mi42Yy02Mi44IDUzLjYtNjYuMSAxNDkuOC05LjkgMjA3LjlsMTkzLjUgMTk5LjhjMTIuNSAxMi45IDMyLjggMTIuOSA0NS4zIDBsMTkzLjUtMTk5LjhjNTYuMy01OC4xIDUzLTE1NC4zLTkuOC0yA03Ljl6Ii8+PC9zdmc+",
                dotsOptions: {
                    color: "#C55C66",
                    type: "classy-rounded"
                },
                backgroundOptions: {
                    color: "#ffffff", 
                },
                imageOptions: {
                    margin: 8,
                    imageSize: 0.35
                },
                cornersSquareOptions: {
                    type: "extra-rounded",
                    color: "#590d22"
                },
                cornersDotOptions: {
                    type: "dot",
                    color: "#590d22"
                },
                qrOptions: {
                    errorCorrectionLevel: "H"
                }
            });

            // Dibujamos el QR
            qrCode.append(resultContainer);
            
            // Animación de latido
            canvasContainer.classList.remove("pulse");
            void canvasContainer.offsetWidth; 
            canvasContainer.classList.add("pulse");
            
            document.getElementById("download-btn").style.display = "inline-block";
        }

        function downloadQR() {
            if(qrCode) {
                qrCode.download({ name: "qr-ximenita", extension: "png" });
            }
        }
    </script>
</body>
</html>
