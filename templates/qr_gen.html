<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR - Xime</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FBDBDA;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #590d22;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 0.5rem; color: #590d22; }
        input {
            width: 100%;
            padding: 12px;
            margin: 1rem 0;
            border: 2px solid #E9ABAC;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: monospace;
        }
        button {
            background-color: #C55C66;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover { background-color: #CE6E75; }
        #download-btn { background-color: #590d22; }
        #canvas-container { margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Generador de QR 🫀</h1>
        <p>Ingresa la URL para generar el código con el emoji central.</p>
        
        <input type="text" id="qr-url" placeholder="URL del proyecto" value="http://192.168.100.18:8000">
        
        <div class="btns">
            <button onclick="generateQR()">Generar QR</button>
            <button onclick="downloadQR()" id="download-btn" style="display:none;">Descargar PNG</button>
        </div>
        
        <div id="canvas-container"></div>
    </div>

    <script>
        let qrCode;

        function generateQR() {
            const url = document.getElementById('qr-url').value;
            if (!url) return alert("Por favor ingresa una URL");

            qrCode = new QRCodeStyling({
                width: 300,
                height: 300,
                type: "canvas",
                data: url,
                // SVG que contiene el emoji 🫀
                image: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫀</text></svg>",
                dotsOptions: {
                    color: "#C55C66",
                    type: "rounded"
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 5,
                    imageSize: 0.4
                },
                cornersSquareOptions: {
                    color: "#590d22",
                    type: "extra-rounded"
                },
                qrOptions: {
                    errorCorrectionLevel: "H" // Nivel alto para permitir el emoji en el centro
                }
            });

            const container = document.getElementById("canvas-container");
            container.innerHTML = "";
            qrCode.append(container);
            document.getElementById("download-btn").style.display = "inline-block";
        }

        function downloadQR() {
            if(qrCode) {
                qrCode.download({ name: "qr-ximenita-corazon", extension: "png" });
            }
        }
    </script>
</body>
</html>
