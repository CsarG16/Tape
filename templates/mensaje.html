{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti ❤</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem !important; }
    </style>
</head>
<body>
    <audio id="romantic-audio" loop autoplay>
        <source src="{% static 'Hecha Pa\' Mi.mp3' %}" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Para: Ximenita</h1>
        <p>"Porque cada dibujo y cada letra de esta carta tienen un solo dueño... Tú."</p>
        <div style="font-size: 3rem; margin-top: 1rem;">✨💖✨</div>
        <a href="{% url 'index' %}" style="text-decoration: none; color: #ff4d6d; font-size: 0.9rem; display: block; margin-top: 2rem;">← Volver</a>
    </div>

    <script src="{% static 'main.js' %}"></script>
    <script>
        // Intentar reproducir automáticamente al cargar
        window.addEventListener('load', () => {
            const audio = document.getElementById('romantic-audio');
            audio.play().catch(() => {
                console.log("El navegador bloqueó el autoplay. Se requiere interacción.");
            });
        });
    </script>
</body>
</html>
