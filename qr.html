<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Código QR Romántico 🫀</title>
    <!-- Tailwind CSS CDN for the utility page -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b070e;
            background-image: radial-gradient(circle at 10% 20%, rgba(247, 37, 133, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 40%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-center items-center p-6 select-none">
    
    <div class="glass-panel max-w-md w-full p-8 rounded-3xl shadow-2xl text-center space-y-6">
        
        <div class="space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-pink-200">Generador de QR 🫀</h1>
            <p class="text-xs text-white/50">Crea el código QR para que tu novia lo escanee desde su celular</p>
        </div>

        <div class="space-y-4">
            <div class="text-left space-y-1.5">
                <label for="qr-url" class="text-xs font-semibold text-pink-300/80 tracking-wide uppercase">Enlace de la Web</label>
                <input type="text" id="qr-url" 
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-pink-500 transition-colors placeholder-white/20 text-center font-mono"
                       placeholder="https://tu-usuario.github.io/reproductor" 
                       value="http://192.168.100.18:5173">
            </div>

            <button onclick="generateQR()" 
                    class="w-full bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white font-semibold text-sm py-3 px-4 rounded-xl active:scale-[0.98] transition-all shadow-lg shadow-pink-500/20 cursor-pointer">
                Generar QR Romántico
            </button>
        </div>

        <!-- Canvas Container -->
        <div id="canvas-container" class="flex justify-center items-center min-h-[260px] bg-white/5 rounded-2xl border border-white/5 overflow-hidden transition-all relative">
            <span id="canvas-placeholder" class="text-xs text-white/30 absolute">El código aparecerá aquí</span>
        </div>

        <button id="download-btn" onclick="downloadQR()" 
                class="hidden w-full bg-white text-[#0b070e] font-semibold text-sm py-3 px-4 rounded-xl active:scale-[0.98] transition-all cursor-pointer">
            Descargar Imagen PNG 📥
        </button>

        <a href="/" class="block text-xs text-pink-300/60 hover:text-pink-300 transition-colors pt-2">
            ← Volver al Reproductor
        </a>
    </div>

    <script>
        let qrCode;

        function generateQR() {
            const url = document.getElementById('qr-url').value;
            if (!url) return alert("Por favor ingresa una URL válida");

            // Hide placeholder text
            document.getElementById('canvas-placeholder').classList.add('hidden');

            qrCode = new QRCodeStyling({
                width: 260,
                height: 260,
                type: "canvas",
                data: url,
                // Heart emoji centered image
                image: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫀</text></svg>",
                dotsOptions: {
                    color: "#f72585",
                    type: "rounded"
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 4,
                    imageSize: 0.35
                },
                cornersSquareOptions: {
                    color: "#7c3aed",
                    type: "extra-rounded"
                },
                qrOptions: {
                    errorCorrectionLevel: "H" // High level to fit the central emoji
                }
            });

            const container = document.getElementById("canvas-container");
            container.innerHTML = "";
            qrCode.append(container);
            
            // Show download button
            document.getElementById("download-btn").classList.remove('hidden');
        }

        function downloadQR() {
            if(qrCode) {
                qrCode.download({ name: "qr-ximenita-sorpresa", extension: "png" });
            }
        }
    </script>
</body>
</html>
